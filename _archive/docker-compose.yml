version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: terminal-ai-backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - backend-data:/app/data
    networks:
      - terminal-ai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: terminal-ai-frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - terminal-ai

  nginx:
    image: nginx:alpine
    container_name: terminal-ai-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - terminal-ai

  # Opsiyonel: SSL sertifikası için Certbot
  # İlk kurulumda comment out edildi, sonra aktif edilecek
  # certbot:
  #   image: certbot/certbot
  #   container_name: terminal-ai-certbot
  #   volumes:
  #     - certbot-webroot:/var/www/certbot
  #     - certbot-certs:/etc/letsencrypt
  #   entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  backend-data:
  certbot-webroot:
  certbot-certs:

networks:
  terminal-ai:
    driver: bridge
